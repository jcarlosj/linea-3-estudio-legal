<!-- wp:group {"tagName":"header","align":"full","layout":{"type":"flex","flexWrap":"nowrap","justifyContent":"space-between"},"style":{"position":{"type":"sticky","top":"0px"},"spacing":{"padding":{"top":"var:preset|spacing|40","bottom":"var:preset|spacing|40","left":"var:preset|spacing|50","right":"var:preset|spacing|50"}},"color":{"background":"var:preset|color|base"}}} -->
<header class="wp-block-group alignfull has-base-background-color has-background"
	style="padding-top:var(--wp--preset--spacing--40);padding-right:var(--wp--preset--spacing--50);padding-bottom:var(--wp--preset--spacing--40);padding-left:var(--wp--preset--spacing--50);position:sticky;top:0px;z-index:999">

	<!-- wp:group {"className":"responsive-logo-wrapper","layout":{"type":"flex","flexWrap":"nowrap"}} -->
	<div class="wp-block-group responsive-logo-wrapper">
		<!-- wp:image {"linkDestination":"custom","style":{"layout":{"selfStretch":"fit","flexSize":null}}} -->
		<figure class="wp-block-image"><a href="/"><img
					src="/wp-content/uploads/logo-horizontal-oscuro.png" alt="Línea 3 Estudio Legal" /></a></figure>
		<!-- /wp:image -->
	</div>
	<!-- /wp:group -->
	<!-- wp:group {"layout":{"type":"flex","flexWrap":"nowrap","justifyContent":"right"},"style":{"spacing":{"blockGap":"2rem"}}} -->
	<div class="wp-block-group" style="gap:2rem">
		<!-- wp:navigation {"overlayMenu":"mobile","overlayBackgroundColor":"base","overlayTextColor":"text-main","style":{"spacing":{"blockGap":"32px"}},"layout":{"type":"flex","justifyContent":"right","orientation":"horizontal","flexWrap":"nowrap"}} -->
		<!-- wp:navigation-link {"label":"Nosotros","url":"/nosotros/","kind":"custom","isTopLevelLink":true} /-->
		<!-- wp:navigation-link {"label":"Servicios","url":"/servicios/","kind":"custom","isTopLevelLink":true} /-->
		<!-- wp:navigation-link {"label":"Blog","url":"/blog/","kind":"custom","isTopLevelLink":true} /-->
		<!-- wp:navigation-link {"label":"Contacto","url":"/contacto/","kind":"custom","isTopLevelLink":true} /-->
		<!-- /wp:navigation -->

		<!-- wp:buttons -->
		<div class="wp-block-buttons">
			<!-- wp:button {"className":"search-btn"} -->
			<div class="wp-block-button search-btn"><a class="wp-block-button__link wp-element-button"
					href="#search" id="search-toggle-btn">
					<span class="btn-icon">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
							stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<circle cx="11" cy="11" r="8"></circle>
							<line x1="21" y1="21" x2="16.65" y2="16.65"></line>
						</svg>
					</span>
				</a></div>
			<!-- /wp:button -->

			<!-- wp:button {"className":"cta-legal-btn"} -->
			<div class="wp-block-button cta-legal-btn"><a class="wp-block-button__link wp-element-button"
					href="/contacto/">
					<span class="btn-icon">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
							stroke-width="2">
							<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
						</svg>
					</span>
					<span class="btn-text">CONSULTAR</span>
				</a></div>
			<!-- /wp:button -->
		</div>
		<!-- /wp:buttons -->
	</div>
	<!-- /wp:group -->

	<!-- wp:group {"className":"floating-search-container","layout":{"type":"constrained"}} -->
	<div class="wp-block-group floating-search-container">
		<!-- wp:search {"showLabel":false,"placeholder":"Buscar en el archivo...","buttonText":"BUSCAR"} /-->
	</div>
	<!-- /wp:group -->

	<!-- wp:html -->
	<script>
		document.addEventListener('DOMContentLoaded', function() {
			var toggleBtn = document.getElementById('search-toggle-btn');
			var searchContainer = document.querySelector('.floating-search-container');
			
			if (toggleBtn && searchContainer) {
				toggleBtn.addEventListener('click', function(e) {
					e.preventDefault();
					searchContainer.classList.toggle('is-open');
				});

				// Ocultar inmediatamente el cajón al dar clic en el botón "Buscar" mientras procesa la búsqueda
				var searchForm = searchContainer.querySelector('form');
				if (searchForm) {
					searchForm.addEventListener('submit', function() {
						searchContainer.classList.remove('is-open');
					});
				}
			}
		});
	</script>
	<!-- /wp:html -->
</header>
<!-- /wp:group -->
